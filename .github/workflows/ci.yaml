name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-xero-mcp-${{ github.ref }}
  cancel-in-progress: true

# CI only reads the repo; it never needs to write back or use elevated scopes.
permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript build
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: npm audit (fail on HIGH+ in production deps)
        # Gate on what ships to the runtime image. Dev-only advisories
        # (build tools, linters) never reach production, so they must not
        # block a security deploy — they still get Dependabot PRs for
        # visibility. Also avoids the all-or-nothing deadlock where one
        # dev-tool advisory with no fix wedges every PR red.
        run: npm audit --omit=dev --audit-level=high

      # Enforce the hosted-deployment filesystem guard so a future refactor
      # (renaming the disable flag, simplifying childEnv) can't silently reopen
      # the secret-read / file-write holes this protects against.
      - name: Verify attachment filesystem guard
        run: npm run verify:fs-guard

      # Enforce that the transport stays STATELESS (issues no mcp-session-id) and
      # the per-user child pool keeps users isolated. This is what makes instance
      # replacement invisible; a refactor that reintroduced session state would
      # bring back the 404-on-recycle disconnect this guards against.
      - name: Verify stateless MCP transport + child pool
        run: npm run verify:stateless

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build container image (no push)
        run: docker build --pull -t xero-mcp-server:ci-${{ github.sha }} .

      - name: Smoke-test the image
        run: |
          # Boot the container with fake env, confirm:
          #   1. it stays running for >5s
          #   2. /healthz responds 200 (proves the express server is up)
          docker run -d --name xero-mcp-smoke -p 18080:8080 \
            -e PUBLIC_URL=http://localhost:18080 \
            -e GCP_PROJECT=ci-smoke \
            -e XERO_APP_CLIENT_ID=ci-smoke \
            -e XERO_APP_CLIENT_SECRET=ci-smoke \
            -e MCP_JWT_SECRET=ci-smoke-secret-do-not-trust \
            xero-mcp-server:ci-${{ github.sha }}
          sleep 5
          STATE=$(docker inspect -f '{{.State.Status}}' xero-mcp-smoke)
          if [ "$STATE" != "running" ]; then
            echo "::error::container is in state '$STATE' after 5s"
            docker logs xero-mcp-smoke
            docker rm -f xero-mcp-smoke
            exit 1
          fi
          if ! curl -fsS --max-time 5 http://localhost:18080/healthz | grep -q '"ok"'; then
            echo "::error::/healthz did not return ok"
            docker logs xero-mcp-smoke
            docker rm -f xero-mcp-smoke
            exit 1
          fi
          echo "Container is running and /healthz returns ok."
          docker rm -f xero-mcp-smoke
