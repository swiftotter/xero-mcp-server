name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to current commit SHA)'
        required: false
        type: string

concurrency:
  group: deploy-xero-mcp
  cancel-in-progress: false

env:
  GCP_PROJECT: internal-mcps-496022
  GCP_REGION: us-central1
  ARTIFACT_REPO: xero-mcp
  IMAGE_NAME: server
  SERVICE_NAME: xero-mcp

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.image-ref.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image tag
        id: image-ref
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::12}"; fi
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}"
          {
            echo "image=${REGISTRY}:${TAG}"
            echo "image_latest=${REGISTRY}:latest"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          docker build \
            -t "${{ steps.image-ref.outputs.image }}" \
            -t "${{ steps.image-ref.outputs.image_latest }}" \
            .
          docker push "${{ steps.image-ref.outputs.image }}"
          docker push "${{ steps.image-ref.outputs.image_latest }}"

      - name: Build summary
        run: |
          {
            echo "## Image built"
            echo ""
            echo "- **Tag:** \`${{ steps.image-ref.outputs.tag }}\`"
            echo "- **Image:** \`${{ steps.image-ref.outputs.image }}\`"
            echo "- **Also tagged:** \`${{ steps.image-ref.outputs.image_latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  rollout:
    name: Roll out the shared xero-mcp service
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run service to new image
        run: |
          gcloud run services update "${{ env.SERVICE_NAME }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --region="${{ env.GCP_REGION }}" \
            --image="${{ needs.build-and-push.outputs.image }}" \
            --quiet

      - name: Verify rollout
        run: |
          LIVE_IMAGE=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --region="${{ env.GCP_REGION }}" \
            --format="value(spec.template.spec.containers[0].image)")
          echo "Live image: ${LIVE_IMAGE}"
          if [ "${LIVE_IMAGE}" != "${{ needs.build-and-push.outputs.image }}" ]; then
            echo "::error::Live image (${LIVE_IMAGE}) does not match deployed image (${{ needs.build-and-push.outputs.image }})"
            exit 1
          fi
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --region="${{ env.GCP_REGION }}" \
            --format="value(status.url)")
          STATUS=$(curl -fsS --retry 5 --retry-delay 5 "${SERVICE_URL}/status")
          echo "/status: ${STATUS}"
          if ! echo "${STATUS}" | grep -q '"status":"ok"'; then
            echo "::error::/status health check failed"
            exit 1
          fi

      - name: Rollout summary
        if: always()
        run: |
          {
            echo "## Rollout"
            echo ""
            echo "- **Service:** \`${{ env.SERVICE_NAME }}\`"
            echo "- **Image:** \`${{ needs.build-and-push.outputs.image }}\`"
            echo "- **Status:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
